id: "VM0047_PHASE1"
name: "ARR using Stocking Index (VM0047-aligned Phase 1)"
standard: "Verra"
version: "1.1-phase1"

estimation_level: "intermediate"
not_for_credit_issuance: true

applicability:
  type: "ARR"
  geography: "Global"
  description: "Phase 1 implementation aligned with VM0047 structure using manually provided Stocking Index data."

# ------------------------
# INPUTS
# ------------------------
inputs:
  - id: "area_ha"
    type: "number"
    unit: "ha"
    required: true

  - id: "project_si"
    type: "array"
    unit: "dimensionless"
    required: true
    description: "Annual Stocking Index for project area (time series)"

  - id: "control_si"
    type: "array"
    unit: "dimensionless"
    required: true
    description: "Annual Stocking Index for control areas (time series)"

  - id: "carbon_fraction"
    type: "number"
    unit: "tC/tDM"
    required: false
    default: 0.47

# ------------------------
# QUANTIFICATION
# ------------------------
quantification:
  steps:

    # 1. SI → AGB（プロジェクト）
    - id: "project_agb"
      method: "si_to_agb"
      inputs: ["project_si"]
      parameters:
        a: 12.5
        b: 1.3
      output: "project_agb"

    # 2. SI → AGB（コントロール）
    - id: "control_agb"
      method: "si_to_agb"
      inputs: ["control_si"]
      parameters:
        a: 12.5
        b: 1.3
      output: "control_agb"

    # 3. ベンチマーク（中央値）
    - id: "benchmark_agb"
      method: "percentile"
      inputs: ["control_agb"]
      parameters:
        p: 50
      output: "benchmark_agb"

    # 4. 追加性（プロジェクト - ベンチマーク）
    - id: "additional_agb"
      method: "subtract"
      inputs: ["project_agb", "benchmark_agb"]
      output: "additional_agb"

    # 5. マイナスはゼロに（保守性）
    - id: "additional_agb_clipped"
      method: "clip_min"
      inputs: ["additional_agb"]
      parameters:
        min: 0
      output: "additional_agb_clipped"

    # 6. AGB → CO2e
    - id: "co2e_per_ha"
      method: "agb_to_co2"
      inputs: ["additional_agb_clipped"]
      parameters:
        carbon_fraction: 0.47
      output: "co2e_per_ha"

    # 7. 面積適用
    - id: "gross_co2e"
      method: "multiply"
      inputs: ["co2e_per_ha", "area_ha"]
      output: "gross_co2e"

# ------------------------
# DEDUCTIONS
# ------------------------
deductions:
  uncertainty: 0.10
  leakage: 0.05
  buffer: 0.10

deductions_order:
  - uncertainty
  - leakage
  - buffer
