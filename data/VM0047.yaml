id: "VM0047"
name: "ARR Simplified Estimation (Verra VM0047-inspired)"
standard: "Verra"
version: "1.0"
estimation_level: "simplified"
not_for_credit_issuance: true

applicability:
  type: "ARR"
  geography: "Global"
  description: "Methodology for Afforestation, Reforestation, and Revegetation projects."

inputs:
  - id: "area_ha"
    label: "Project Area"
    type: "number"
    unit: "hectares"
    required: true
    description: "Total eligible area for planting."

  - id: "baseline_stock_tCO2_ha"
    label: "Baseline Carbon Stock"
    type: "number"
    unit: "tCO2e/ha"
    required: true
    default: 0
    description: "Existing stock (usually near zero for degraded land)."

  - id: "avg_growth_rate_tCO2_ha_yr"
    label: "Average Growth Rate"
    type: "number"
    unit: "tCO2e/ha/yr"
    required: true
    description: "Estimated annual carbon sequestration."

  - id: "project_duration_years"
    label: "Project Duration"
    type: "number"
    unit: "years"
    required: true
    default: 20
    description: "Crediting period length."

quantification:
  steps:
    - id: "baseline_emissions"
      method: "multiply"
      inputs: ["area_ha", "baseline_stock_tCO2_ha"]
      output: "baseline_total"
      description: "Calculate Total Baseline Emissions"

    - id: "annual_removals"
      method: "multiply"
      inputs: ["area_ha", "avg_growth_rate_tCO2_ha_yr"]
      output: "annual_removals"
      description: "Calculate Annual Project Removals"

    - id: "gross_removals"
      method: "multiply"
      inputs: ["annual_removals", "project_duration_years"]
      output: "gross_co2e"
      description: "Calculate Gross Removals over Duration"

    - id: "net_pre_deduction"
      method: "subtract"
      inputs: ["gross_co2e", "baseline_total"]
      output: "net_pre_deduction"
      description: "Calculate Net Removals (Pre-Deduction)"

deductions:
  uncertainty: 0.05
  leakage: 0.10
  buffer: 0.15
